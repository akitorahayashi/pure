name: Build

on:
  workflow_call:
    inputs:
      release_id:
        required: false
        type: string

jobs:
  build-debug:
    name: Build debug binary
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust Environment
        uses: ./.github/actions/setup
        with:
          rust-version: 1.90.0
          install-mise: 'true'
          mise-tools: just

      - name: Build debug binary
        run: mise exec -- just build

  build-release:
    name: Build release binary
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: prf-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: prf-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: prf-darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: prf-darwin-aarch64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust Environment
        uses: ./.github/actions/setup
        with:
          rust-version: 1.90.0

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build release binary (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/prf ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload release asset
        if: inputs.release_id != ''
        uses: akitorahayashi/gh-release@v1
        with:
          mode: upload
          token: ${{ github.token }}
          release_id: ${{ inputs.release_id }}
          files: ${{ matrix.artifact }}
          overwrite: true
